name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: |
          MAX_SIZE_KB=500
          MAIN_BUNDLE=$(find dist/assets -name '*.js' -not -name 'vendor-*' | head -1)
          if [ -n "$MAIN_BUNDLE" ]; then
            SIZE_KB=$(( $(wc -c < "$MAIN_BUNDLE") / 1024 ))
            echo "Main bundle: ${SIZE_KB}KB (limit: ${MAX_SIZE_KB}KB)"
            if [ "$SIZE_KB" -gt "$MAX_SIZE_KB" ]; then
              echo "::warning::Main bundle (${SIZE_KB}KB) exceeds ${MAX_SIZE_KB}KB"
            fi
          fi
          echo "## Bundle sizes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh dist/assets/*.js | sort -rh >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high || true
